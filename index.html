<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slot Saldo & Redeem</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-[#1cfdd7] min-h-screen flex items-center justify-center px-4">

  <!-- MAIN WRAPPER -->
  <div class="w-full max-w-sm sm:max-w-md">

    <!-- LOGO -->
    <div class="flex justify-center mb-6">
      <img 
        src="https://i.ibb.co/3mXd4Bw8/logo-sloki.png"
        alt="Logo"
        class="w-40 sm:w-52 h-auto object-contain"
      >
    </div>

    <!-- CARD -->
    <div class="bg-black/40 backdrop-blur-lg border border-[#1cfdd7] p-6 sm:p-8 rounded-2xl shadow-2xl text-center">

      <h1 class="text-xl sm:text-2xl font-bold text-white mb-6">
        KLAIM KODE KEMENANGAN
      </h1>

      <!-- INPUT PLAYER ID -->
      <input
        type="text"
        id="playerId"
        placeholder="Masukkan ID Player"
        class="w-full px-4 py-3 mb-3 rounded bg-gray-800 text-white text-center uppercase
               focus:ring-2 focus:ring-[#1cfdd7] outline-none text-sm sm:text-base"
      >

      <!-- INPUT REDEEM CODE -->
      <input
        type="text"
        id="redeemCode"
        placeholder="Masukkan Kode"
        class="w-full px-4 py-3 mb-5 rounded bg-gray-800 text-white text-center uppercase
               focus:ring-2 focus:ring-[#1cfdd7] outline-none text-sm sm:text-base"
      >

      <!-- BUTTON -->
      <button
        onclick="spinSlot()"
        class="w-full py-3 rounded-lg font-bold text-black bg-gradient-to-r from-[#1cfdd7] to-cyan-400
               hover:scale-[1.02] active:scale-[0.98] transition text-sm sm:text-base"
      >
        AMBIL
      </button>

    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center px-4">
    <div class="bg-gray-900 p-6 rounded-xl w-full max-w-sm text-center border border-[#1cfdd7]">

      <h2 id="modalTitle" class="text-lg sm:text-xl font-bold mb-3 text-white"></h2>
      <p id="modalText" class="text-sm whitespace-pre-line text-gray-300"></p>

      <button
        onclick="goLogin()"
        class="mt-5 w-full py-2 bg-[#1cfdd7] hover:bg-cyan-300 rounded text-black font-semibold"
      >
        Login
      </button>

    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const validCodes = ["SLOKI88VIP"];

    function spinSlot() {
      const playerId = document.getElementById("playerId").value.trim();
      const redeemCode = document.getElementById("redeemCode").value.trim().toUpperCase();

      if (!playerId || !redeemCode) {
        showModal("❌ Gagal", "ID Player dan Kode Redeem harus diisi!");
        return;
      }

      if (!validCodes.includes(redeemCode)) {
        showModal("❌ Kode Tidak Valid", "Kode redeem yang dimasukkan tidak valid.");
        return;
      }

      const minSaldo = 980000;
      const maxSaldo = 7800000;

      let saldoRandom = Math.floor(Math.random() * (maxSaldo - minSaldo + 1)) + minSaldo;

      if (saldoRandom % 2 !== 0) saldoRandom++;

      const saldoFormatted = saldoRandom
        .toString()
        .replace(/\B(?=(\d{3})+(?!\d))/g, ".");

      showModal(
        "🎉 KODE BERHASIL",
        `ID: ${playerId}\nSaldo: ${saldoFormatted}\nBatas Waktu 2 Jam!\nSegera deposit dan menangkan saldonya!`
      );
    }

    function showModal(title, text) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalText").textContent = text;

      const modal = document.getElementById("modal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function goLogin() {
      window.location.href = "https://sloki88val.com/?utm_medium=chat&utm_campaign=link-shared-in-chat&utm_source=livechat.com&utm_content=sloki88val.com";
    }
  </script>

</body>
</html>
